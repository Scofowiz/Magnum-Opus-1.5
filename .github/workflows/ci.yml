# Claude Flow V3 - Continuous Integration Pipeline
# Release Engineer: Agent #15 | Swarm ID: swarm-1770207164275
# Generated: 2026-02-04

name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test suite (emergency only)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  # Stage 1: Code Quality & Linting
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: ESLint Check
        run: npm run lint --if-present
        continue-on-error: true

      - name: Prettier Check
        run: npx prettier --check "src/**/*.{ts,tsx}" "server/**/*.ts" --ignore-unknown
        continue-on-error: true

  # Stage 2: Security Scanning
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: Claude Flow Security Scan
        run: |
          if command -v npx &> /dev/null; then
            npx @claude-flow/cli@latest security scan --format json > security-report.json || true
          fi
        continue-on-error: true

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.json
          retention-days: 30
        if: always()

  # Stage 3: Unit Tests
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test --if-present
        env:
          CI: true

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
        if: always()

  # Stage 4: Integration Tests
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Integration Tests
        run: npm run test:integration --if-present
        env:
          CI: true
          REDIS_URL: redis://localhost:6379

  # Stage 5: Build Verification
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify Build Output
        run: |
          if [ -d "dist" ]; then
            echo "Build output verified"
            ls -la dist/
          else
            echo "Warning: No dist directory found"
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-node-${{ matrix.node }}
          path: dist/
          retention-days: 7
        if: matrix.node == 20

  # Stage 6: Claude Flow V3 Validation
  claude-flow-validation:
    name: Claude Flow V3 Validation
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Claude Flow Config
        run: |
          if [ -f ".claude-flow/config.yaml" ]; then
            echo "Claude Flow V3 config found"
            cat .claude-flow/config.yaml
          else
            echo "No Claude Flow config found - skipping validation"
          fi

      - name: Run Doctor Check
        run: |
          npx @claude-flow/cli@latest doctor --fix || true

      - name: Validate Memory Schema
        run: |
          if [ -f ".swarm/schema.sql" ]; then
            echo "Memory schema validated"
          fi
        continue-on-error: true

  # Final: CI Summary
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [lint, security, test-unit, build, claude-flow-validation]
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "CI Pipeline Summary"
          echo "==================="
          echo "Lint: ${{ needs.lint.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Unit Tests: ${{ needs.test-unit.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Claude Flow: ${{ needs.claude-flow-validation.result }}"

      - name: Fail if Critical Jobs Failed
        if: ${{ needs.lint.result == 'failure' || needs.build.result == 'failure' }}
        run: exit 1
